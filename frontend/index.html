<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>平安银行账单分析 Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.5.31/dist/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            --text-primary: #ffffff;
            --text-secondary: #a0aec0;
            --text-tertiary: #718096;
        }

        body.light-mode {
            --text-primary: #1a202c;
            --text-secondary: #4a5568;
            --text-tertiary: #718096;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s ease;
        }

        body.light-mode {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: rgba(30, 30, 46, 0.95);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        body.light-mode header {
            background: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: none;
        }

        h1 {
            color: #e0e0e0;
            margin-bottom: 20px;
            font-size: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        body.light-mode h1 {
            color: #333;
        }

        .theme-toggle {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #e0e0e0;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        body.light-mode .theme-toggle {
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.1);
            color: #333;
        }

        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .config-section {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            gap: 15px;
            align-items: flex-end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }

        input, select {
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            padding: 10px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
            font-size: 14px;
        }

        .status.loading {
            background: rgba(25, 118, 210, 0.2);
            color: #64b5f6;
            display: block;
        }

        body.light-mode .status.loading {
            background: #e3f2fd;
            color: #1976d2;
        }

        .status.success {
            background: rgba(56, 142, 60, 0.2);
            color: #81c784;
            display: block;
        }

        body.light-mode .status.success {
            background: #e8f5e9;
            color: #388e3c;
        }

        .status.error {
            background: rgba(211, 47, 47, 0.2);
            color: #e57373;
            display: block;
        }

        body.light-mode .status.error {
            background: #ffebee;
            color: #d32f2f;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(30, 30, 46, 0.95);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: move;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
        }

        .card.dragging {
            opacity: 0.5;
            transform: scale(1.02);
        }

        body.light-mode .card {
            background: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: none;
        }

        .card h2 {
            font-size: 16px;
            color: #e0e0e0;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        body.light-mode .card h2 {
            color: #333;
            border-bottom: 2px solid #f0f0f0;
        }

        .card canvas {
            max-height: 300px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: white;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            margin: 10px 0;
        }

        .stat-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .bill-list {
            background: rgba(30, 30, 46, 0.95);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        body.light-mode .bill-list {
            background: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: none;
        }

        .bill-item {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: opacity 0.3s ease;
        }

        body.light-mode .bill-item {
            border-bottom: 1px solid #f0f0f0;
        }

        .bill-item:last-child {
            border-bottom: none;
        }

        .bill-item.refunded {
            opacity: 0.5;
        }

        .bill-item.refunded .bill-info h3,
        .bill-item.refunded .bill-info p,
        .bill-item.refunded .bill-amount {
            text-decoration: line-through;
            color: #888;
        }

        .bill-item:hover .refund-btn {
            opacity: 1;
        }

        .refund-btn {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            opacity: 0;
            transition: all 0.3s ease;
            margin-left: 10px;
        }

        .refund-btn:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        .refund-btn.refunded {
            background: rgba(34, 197, 94, 0.2);
            border-color: rgba(34, 197, 94, 0.3);
            color: #22c55e;
            opacity: 1;
        }

        .bill-info {
            flex: 1;
        }

        .bill-info h3 {
            font-size: 14px;
            color: #e0e0e0;
            margin-bottom: 5px;
        }

        body.light-mode .bill-info h3 {
            color: #333;
        }

        .bill-info p {
            font-size: 12px;
            color: #a0a0a0;
        }

        body.light-mode .bill-info p {
            color: #999;
        }

        .bill-amount {
            font-size: 18px;
            font-weight: bold;
            color: #e57373;
        }

        body.light-mode .bill-amount {
            color: #d32f2f;
        }

        .year-section {
            margin-bottom: 30px;
        }

        .year-header {
            font-size: 18px;
            color: #667eea;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(102, 126, 234, 0.3);
            font-weight: bold;
        }

        body.light-mode .year-header {
            border-bottom: 2px solid rgba(102, 126, 234, 0.3);
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        body.light-mode .spinner {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>
                <span>📊 平安银行账单分析 Dashboard</span>
                <button class="theme-toggle" onclick="toggleTheme()">🌙 深色模式</button>
            </h1>
            
            <div class="config-section">
                <div class="form-group">
                    <label>邮箱地址</label>
                    <input type="email" id="email" placeholder="例: you@163.com" value="sdlyingyong@163.com">
                </div>

                <div class="form-group">
                    <label>邮箱类型</label>
                    <select id="emailType">
                        <option value="163">163 邮箱</option>
                        <option value="qq">QQ 邮箱</option>
                        <option value="gmail">Gmail</option>
                        <option value="aliyun">阿里云邮箱</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>邮箱密码/授权码</label>
                    <input type="password" id="authCode" placeholder="输入邮箱密码或授权码">
                </div>

                <button id="fetchBtn" onclick="fetchBills()">开始读取</button>
            </div>

            <div id="status" class="status"></div>
        </header>

        <!-- 统计数据 -->
        <div class="stats-grid" id="statsGrid" style="display: none;">
            <div class="stat-box">
                <div class="stat-label">总消费</div>
                <div class="stat-value" id="totalAmount">¥0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">账单数量</div>
                <div class="stat-value" id="billCount">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">平均单笔</div>
                <div class="stat-value" id="avgAmount">¥0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">最大消费</div>
                <div class="stat-value" id="maxAmount">¥0</div>
            </div>
        </div>

        <!-- 退款标记管理 -->
        <div id="refundManager" style="display: none; text-align: center; margin: 20px 0;">
            <button onclick="clearAllRefunds()" style="background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.3); color: #ef4444; padding: 8px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; margin-right: 10px;">
                🗑️ 清除退款标记
            </button>
            <button onclick="clearLocalData()" style="background: rgba(102, 126, 234, 0.2); border: 1px solid rgba(102, 126, 234, 0.3); color: #667eea; padding: 8px 20px; border-radius: 6px; cursor: pointer; font-size: 14px;">
                🔄 重新获取数据
            </button>
            <span id="refundCount" style="margin-left: 15px; color: #a0aec0; font-size: 14px;"></span>
        </div>

        <!-- Tab导航栏 -->
        <div id="tabNav" style="display: none; margin-bottom: 20px; border-bottom: 2px solid rgba(102, 126, 234, 0.3); padding-bottom: 10px;">
            <button class="tab-btn active" onclick="switchTab('overview')" style="background: rgba(102, 126, 234, 0.3); border: none; color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; margin-right: 10px; transition: all 0.3s ease;">
                📊 概览
            </button>
            <button class="tab-btn" onclick="switchTab('bills')" style="background: rgba(255, 255, 255, 0.05); border: none; color: #a0aec0; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; transition: all 0.3s ease;">
                📋 明细分析
            </button>
        </div>

        <!-- 主内容区域 -->
        <div id="mainContent" style="display: none;">
            <!-- 概览Tab -->
            <div id="overviewTab" class="tab-content" style="display: block;">
                <!-- 图表区域 -->
                <div class="dashboard" id="dashboard">
                    <div class="card" id="monthlyCard">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                        <div style="display: flex; align-items: center; gap: 15px;">
                            <h2 id="monthlyTitle" style="margin: 0;">📈 月度消费趋势</h2>
                            <div id="monthlyYearSelector" style="display: flex; align-items: center; gap: 10px;">
                                <button id="monthlyPrevYear" onclick="changeMonthlyYear(-1)" style="background: rgba(102, 126, 234, 0.2); border: 1px solid rgba(102, 126, 234, 0.3); color: #667eea; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 14px;">
                                    ←
                                </button>
                                <span id="monthlyYearDisplay" style="font-size: 16px; font-weight: bold; color: #667eea; min-width: 60px; text-align: center;"></span>
                                <button id="monthlyNextYear" onclick="changeMonthlyYear(1)" style="background: rgba(102, 126, 234, 0.2); border: 1px solid rgba(102, 126, 234, 0.3); color: #667eea; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 14px;">
                                    →
                                </button>
                            </div>
                        </div>
                    </div>
                    <canvas id="monthlyChart"></canvas>
                        </div>

                        <div class="card" id="categoryCard">
                    <h2>🥧 消费类别分布</h2>
                    <canvas id="categoryChart"></canvas>
                        </div>

                        <div class="card" id="heatmapCard">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                        <div style="display: flex; align-items: center; gap: 15px;">
                            <h2 style="margin: 0;">🔥 消费热力图</h2>
                            <div id="heatmapYearSelector" style="display: flex; align-items: center; gap: 10px;">
                                <button id="heatmapPrevYear" onclick="changeHeatmapYear(-1)" style="background: rgba(102, 126, 234, 0.2); border: 1px solid rgba(102, 126, 234, 0.3); color: #667eea; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 14px;">
                                    ←
                                </button>
                                <span id="heatmapYearDisplay" style="font-size: 16px; font-weight: bold; color: #667eea; min-width: 60px; text-align: center;"></span>
                                <button id="heatmapNextYear" onclick="changeHeatmapYear(1)" style="background: rgba(102, 126, 234, 0.2); border: 1px solid rgba(102, 126, 234, 0.3); color: #667eea; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 14px;">
                                    →
                                </button>
                            </div>
                        </div>
                        <button id="heatmapBackBtn" onclick="backHeatmap()" style="display: none; background: rgba(102, 126, 234, 0.2); border: 1px solid rgba(102, 126, 234, 0.3); color: #667eea; padding: 6px 15px; border-radius: 5px; cursor: pointer; font-size: 14px;">
                            ← 返回
                        </button>
                    </div>
                    <canvas id="heatmapChart"></canvas>
                        </div>

                        <div class="card" id="topCard">
                            <h2>📊 消费排行 Top 5</h2>
                            <canvas id="topChart"></canvas>
                        </div>

                        <!-- 频率分析内容 -->
                        <div class="card" id="frequencyCard">
                            <h2>📈 消费频率分析</h2>
                            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 15px;">
                                <div style="text-align: center; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px;">
                                    <div style="font-size: 12px; color: #a0aec0;">日均消费次数</div>
                                    <div id="avgDailyCount" style="font-size: 24px; font-weight: bold; color: #667eea;">0次</div>
                                </div>
                                <div style="text-align: center; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px;">
                                    <div style="font-size: 12px; color: #a0aec0;">日均消费金额</div>
                                    <div id="avgDailyAmount" style="font-size: 24px; font-weight: bold; color: #667eea;">¥0</div>
                                </div>
                                <div style="text-align: center; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px;">
                                    <div style="font-size: 12px; color: #a0aec0;">周均消费次数</div>
                                    <div id="avgWeeklyCount" style="font-size: 24px; font-weight: bold; color: #667eea;">0次</div>
                                </div>
                                <div style="text-align: center; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px;">
                                    <div style="font-size: 12px; color: #a0aec0;">周均消费金额</div>
                                    <div id="avgWeeklyAmount" style="font-size: 24px; font-weight: bold; color: #667eea;">¥0</div>
                                </div>
                            </div>
                            <canvas id="frequencyChart"></canvas>
                        </div>

                        <div class="card" id="weekdayCard">
                            <h2>📅 工作日/周末对比</h2>
                            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 15px;">
                                <div style="text-align: center; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px;">
                                    <div style="font-size: 12px; color: #a0aec0;">工作日消费</div>
                                    <div id="weekdayAmount" style="font-size: 24px; font-weight: bold; color: #667eea;">¥0</div>
                                </div>
                                <div style="text-align: center; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px;">
                                    <div style="font-size: 12px; color: #a0aec0;">周末消费</div>
                                    <div id="weekendAmount" style="font-size: 24px; font-weight: bold; color: #667eea;">¥0</div>
                                </div>
                            </div>
                            <canvas id="weekdayChart"></canvas>
                        </div>

                        <!-- 日历内容 -->
                        <div class="card" id="calendarCard">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                                <h2 style="margin: 0;">📅 消费日历</h2>
                                <div id="calendarYearSelector" style="display: flex; align-items: center; gap: 10px;">
                                    <button id="calendarPrevMonth" onclick="changeCalendarMonth(-1)" style="background: rgba(102, 126, 234, 0.2); border: 1px solid rgba(102, 126, 234, 0.3); color: #667eea; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 14px;">
                                        ←
                                    </button>
                                    <span id="calendarMonthDisplay" style="font-size: 16px; font-weight: bold; color: #667eea; min-width: 80px; text-align: center;"></span>
                                    <button id="calendarNextMonth" onclick="changeCalendarMonth(1)" style="background: rgba(102, 126, 234, 0.2); border: 1px solid rgba(102, 126, 234, 0.3); color: #667eea; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 14px;">
                                        →
                                    </button>
                                </div>
                            </div>
                            <div id="calendarGrid" style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; padding: 10px;"></div>
                            <div style="margin-top: 15px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px;">
                                <div style="display: flex; justify-content: space-around; align-items: center;">
                                    <div style="text-align: center;">
                                        <div style="font-size: 12px; color: #a0aec0;">本月日均消费</div>
                                        <div id="calendarAvg" style="font-size: 20px; font-weight: bold; color: #667eea;">¥0</div>
                                    </div>
                                    <div style="display: flex; gap: 15px; align-items: center;">
                                        <div style="width: 20px; height: 20px; background: #ef4444; border-radius: 50%;"></div>
                                        <span style="font-size: 12px; color: #a0aec0;">高于平均</span>
                                        <div style="width: 20px; height: 20px; background: #f59e0b; border-radius: 50%;"></div>
                                        <span style="font-size: 12px; color: #a0aec0;">接近平均</span>
                                        <div style="width: 20px; height: 20px; background: #22c55e; border-radius: 50%;"></div>
                                        <span style="font-size: 12px; color: #a0aec0;">低于平均</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 账单明细Tab -->
            <div id="billsTab" class="tab-content" style="display: none;">
                <div class="bill-list" id="billList">
                    <h2 style="margin-bottom: 20px;">📋 账单明细</h2>
                    
                    <!-- 筛选控件 -->
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 10px;">
                        <div>
                            <label style="display: block; margin-bottom: 5px; font-size: 14px; color: #a0aec0;">搜索商家</label>
                            <input type="text" id="searchMerchant" placeholder="输入商家名称..." oninput="filterBills()" style="width: 100%; padding: 8px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 5px; color: white;">
                        </div>
                        
                        <div>
                            <label style="display: block; margin-bottom: 5px; font-size: 14px; color: #a0aec0;">金额范围</label>
                            <div style="display: flex; gap: 5px;">
                                <input type="number" id="minAmount" placeholder="最小" oninput="filterBills()" style="width: 50%; padding: 8px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 5px; color: white;">
                                <input type="number" id="maxAmount" placeholder="最大" oninput="filterBills()" style="width: 50%; padding: 8px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 5px; color: white;">
                            </div>
                        </div>
                        
                        <div>
                            <label style="display: block; margin-bottom: 5px; font-size: 14px; color: #a0aec0;">日期范围</label>
                            <select id="dateFilter" onchange="filterBills()" style="width: 100%; padding: 8px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 5px; color: white;">
                                <option value="all">全部</option>
                                <option value="today">今天</option>
                                <option value="week">本周</option>
                                <option value="month">本月</option>
                                <option value="year">本年</option>
                            </select>
                        </div>
                        
                        <div>
                            <label style="display: block; margin-bottom: 5px; font-size: 14px; color: #a0aec0;">分组方式</label>
                            <select id="groupBy" onchange="filterBills()" style="width: 100%; padding: 8px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 5px; color: white;">
                                <option value="date">按日期</option>
                                <option value="month" selected>按月份</option>
                                <option value="year">按年份</option>
                                <option value="category">按分类</option>
                            </select>
                        </div>
                        
                        <div>
                            <label style="display: block; margin-bottom: 5px; font-size: 14px; color: #a0aec0;">排序方式</label>
                            <select id="sortOrder" onchange="filterBills()" style="width: 100%; padding: 8px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 5px; color: white;">
                                <option value="date-desc">日期降序</option>
                                <option value="date-asc">日期升序</option>
                                <option value="amount-desc" selected>金额降序</option>
                                <option value="amount-asc">金额升序</option>
                            </select>
                        </div>
                    </div>
                    
                    <div id="billItems"></div>
                </div>
            </div>
        </div>

        <!-- 空状态 -->
        <div class="empty-state" id="emptyState">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
            </svg>
            <p>输入邮箱和密码/授权码，点击「开始读取」获取账单数据</p>
        </div>
    </div>

    <script>
        const IMAP_SERVERS = {
            "163": "imap.163.com",
            "qq": "imap.qq.com",
            "gmail": "imap.gmail.com",
            "aliyun": "imap.aliyun.com"
        };

        let charts = {};
        let billData = [];
        let refundedItems = new Set(JSON.parse(localStorage.getItem('refundedItems') || '[]'));
        let heatmapView = 'monthly'; // 'monthly' 或 'daily'
        let selectedMonth = null; // 选中的月份 (0-11)
        let selectedYear = null; // 选中的年份
        let heatmapYear = new Date().getFullYear(); // 热力图当前显示的年份
        let monthlyYear = new Date().getFullYear(); // 月度趋势图当前显示的年份
        let calendarYear = new Date().getFullYear(); // 日历当前显示的年份
        let calendarMonth = new Date().getMonth(); // 日历当前显示的月份

        // 页面加载时检查本地存储的账单数据
        window.addEventListener('load', () => {
            const savedTheme = localStorage.getItem('theme');
            const btn = document.querySelector('.theme-toggle');
            
            if (savedTheme === 'light') {
                document.body.classList.add('light-mode');
                btn.textContent = '☀️ 浅色模式';
            }

            // 检查本地存储的账单数据
            const savedBills = localStorage.getItem('billData');
            if (savedBills) {
                try {
                    billData = JSON.parse(savedBills);
                    renderDashboard();
                    showStatus('✅ 已加载本地账单数据', 'success');
                } catch (error) {
                    console.error('加载本地数据失败:', error);
                }
            }

            // 初始化拖拽功能
            initDragAndDrop();
        });

        function toggleRefund(index) {
            // 保存当前滚动位置
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            const scrollLeft = window.pageXOffset || document.documentElement.scrollLeft;
            
            if (refundedItems.has(index)) {
                refundedItems.delete(index);
            } else {
                refundedItems.add(index);
            }
            localStorage.setItem('refundedItems', JSON.stringify([...refundedItems]));
            
            // 更新所有显示
            filterBills();
            updateStats();
            renderCharts();
            updateRefundCount();
            
            // 恢复滚动位置
            window.scrollTo(scrollLeft, scrollTop);
        }

        function clearAllRefunds() {
            // 保存当前滚动位置
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            const scrollLeft = window.pageXOffset || document.documentElement.scrollLeft;
            
            if (confirm('确定要清除所有退款标记吗？')) {
                refundedItems.clear();
                localStorage.setItem('refundedItems', JSON.stringify([]));
                
                // 更新所有显示
                filterBills();
                updateStats();
                renderCharts();
                updateRefundCount();
                
                // 恢复滚动位置
                window.scrollTo(scrollLeft, scrollTop);
            }
        }

        function clearLocalData() {
            if (confirm('确定要清除本地账单数据吗？这将需要重新从邮箱获取数据。')) {
                localStorage.removeItem('billData');
                billData = [];
                document.getElementById("emptyState").style.display = "block";
                document.getElementById("statsGrid").style.display = "none";
                document.getElementById("refundManager").style.display = "none";
                document.getElementById("tabNav").style.display = "none";
                document.getElementById("mainContent").style.display = "none";
                showStatus('✅ 本地数据已清除，请重新获取数据', 'success');
            }
        }

        function updateRefundCount() {
            const count = refundedItems.size;
            const refundCountEl = document.getElementById('refundCount');
            if (count > 0) {
                refundCountEl.textContent = `已标记 ${count} 条退款记录`;
            } else {
                refundCountEl.textContent = '';
            }
        }

        function changeHeatmapYear(delta) {
            heatmapYear += delta;
            monthlyYear = heatmapYear; // 同步月度趋势图的年份
            updateHeatmapYearDisplay();
            updateMonthlyYearDisplay();
            renderCharts();
        }

        function changeMonthlyYear(delta) {
            monthlyYear += delta;
            heatmapYear = monthlyYear; // 同步热力图的年份
            calendarYear = monthlyYear; // 同步日历的年份
            calendarMonth = 0; // 重置日历到1月
            updateMonthlyYearDisplay();
            updateHeatmapYearDisplay();
            updateCalendarView(billData.filter((_, idx) => !refundedItems.has(idx)));
            renderCharts();
        }

        function updateHeatmapYearDisplay() {
            const yearDisplay = document.getElementById('heatmapYearDisplay');
            if (yearDisplay) {
                yearDisplay.textContent = `${heatmapYear}年`;
            }
            
            // 更新年份选择器的显示/隐藏
            const yearSelector = document.getElementById('heatmapYearSelector');
            const backBtn = document.getElementById('heatmapBackBtn');
            if (heatmapView === 'monthly') {
                yearSelector.style.display = 'flex';
                backBtn.style.display = 'none';
            } else {
                yearSelector.style.display = 'none';
                backBtn.style.display = 'block';
            }
        }

        function updateMonthlyYearDisplay() {
            const yearDisplay = document.getElementById('monthlyYearDisplay');
            if (yearDisplay) {
                yearDisplay.textContent = `${monthlyYear}年`;
            }
        }

        function initDragAndDrop() {
            const dashboard = document.getElementById('dashboard');
            const cards = dashboard.querySelectorAll('.card');
            
            // 从本地存储加载模块顺序
            const savedOrder = localStorage.getItem('cardOrder');
            if (savedOrder) {
                try {
                    const order = JSON.parse(savedOrder);
                    order.forEach(cardId => {
                        const card = document.getElementById(cardId);
                        if (card) {
                            dashboard.appendChild(card);
                        }
                    });
                } catch (error) {
                    console.error('加载模块顺序失败:', error);
                }
            }
            
            cards.forEach(card => {
                card.setAttribute('draggable', 'true');
                
                card.addEventListener('dragstart', (e) => {
                    card.classList.add('dragging');
                    e.dataTransfer.effectAllowed = 'move';
                });
                
                card.addEventListener('dragend', () => {
                    card.classList.remove('dragging');
                    saveCardOrder();
                });
                
                card.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                });
                
                card.addEventListener('drop', (e) => {
                    e.preventDefault();
                    const draggingCard = document.querySelector('.dragging');
                    if (draggingCard !== card) {
                        const allCards = Array.from(dashboard.querySelectorAll('.card'));
                        const draggingIndex = allCards.indexOf(draggingCard);
                        const targetIndex = allCards.indexOf(card);
                        
                        if (draggingIndex < targetIndex) {
                            card.parentNode.insertBefore(draggingCard, card.nextSibling);
                        } else {
                            card.parentNode.insertBefore(draggingCard, card);
                        }
                    }
                });
            });
        }

        function saveCardOrder() {
            const dashboard = document.getElementById('dashboard');
            const cards = Array.from(dashboard.querySelectorAll('.card'));
            const order = cards.map(card => card.id);
            localStorage.setItem('cardOrder', JSON.stringify(order));
        }

        function drillDownHeatmap(monthIndex) {
            // 保存当前滚动位置
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            const scrollLeft = window.pageXOffset || document.documentElement.scrollLeft;
            
            // 检查该年份该月份是否有数据
            const hasData = billData.some(bill => {
                const date = new Date(bill.date);
                return date.getMonth() === monthIndex && date.getFullYear() === heatmapYear;
            });
            
            if (!hasData) {
                alert(`${heatmapYear}年${monthIndex + 1}月没有消费数据`);
                return;
            }
            
            // 切换到每日视图
            heatmapView = 'daily';
            selectedMonth = monthIndex;
            selectedYear = heatmapYear;
            
            // 更新显示
            updateHeatmapYearDisplay();
            
            // 重新渲染图表
            renderCharts();
            
            // 恢复滚动位置
            window.scrollTo(scrollLeft, scrollTop);
        }

        function backHeatmap() {
            // 保存当前滚动位置
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            const scrollLeft = window.pageXOffset || document.documentElement.scrollLeft;
            
            // 切换回月度视图
            heatmapView = 'monthly';
            selectedMonth = null;
            selectedYear = null;
            
            // 更新显示（显示年份选择器，隐藏返回按钮）
            updateHeatmapYearDisplay();
            
            // 重新渲染图表
            renderCharts();
            
            // 恢复滚动位置
            window.scrollTo(scrollLeft, scrollTop);
        }

        function updateFrequencyAnalysis(activeBills) {
            const dailyData = {};
            activeBills.forEach(bill => {
                const date = bill.date;
                if (!dailyData[date]) {
                    dailyData[date] = { count: 0, amount: 0 };
                }
                dailyData[date].count++;
                dailyData[date].amount += bill.amount;
            });

            const days = Object.keys(dailyData).length;
            let totalDailyCount = 0;
            Object.values(dailyData).forEach(data => {
                totalDailyCount += data.count;
            });
            const avgDailyCount = days > 0 ? (totalDailyCount / days).toFixed(1) : 0;
            const avgDailyAmount = days > 0 ? (activeBills.reduce((sum, b) => sum + b.amount, 0) / days).toFixed(0) : 0;

            const weeklyData = {};
            activeBills.forEach(bill => {
                const date = new Date(bill.date);
                const weekStart = new Date(date);
                weekStart.setDate(date.getDate() - date.getDay());
                const weekKey = weekStart.toISOString().split('T')[0];
                if (!weeklyData[weekKey]) {
                    weeklyData[weekKey] = { count: 0, amount: 0 };
                }
                weeklyData[weekKey].count++;
                weeklyData[weekKey].amount += bill.amount;
            });

            const weeks = Object.keys(weeklyData).length;
            let totalWeeklyCount = 0;
            Object.values(weeklyData).forEach(data => {
                totalWeeklyCount += data.count;
            });
            const avgWeeklyCount = weeks > 0 ? (totalWeeklyCount / weeks).toFixed(1) : 0;
            const avgWeeklyAmount = weeks > 0 ? (activeBills.reduce((sum, b) => sum + b.amount, 0) / weeks).toFixed(0) : 0;

            document.getElementById('avgDailyCount').textContent = `${avgDailyCount}次`;
            document.getElementById('avgDailyAmount').textContent = `¥${avgDailyAmount}`;
            document.getElementById('avgWeeklyCount').textContent = `${avgWeeklyCount}次`;
            document.getElementById('avgWeeklyAmount').textContent = `¥${avgWeeklyAmount}`;

            const frequencyLabels = Object.keys(dailyData).slice(-30);
            const frequencyData = frequencyLabels.map(date => dailyData[date].count);
            renderChart("frequencyChart", {
                type: "bar",
                labels: frequencyLabels.map(date => date.slice(5)),
                data: frequencyData,
                label: "消费次数",
                borderColor: "#667eea",
                backgroundColor: "rgba(102, 126, 234, 0.6)"
            });
        }

        function updateWeekdayAnalysis(activeBills) {
            let weekdayAmount = 0;
            let weekdayCount = 0;
            let weekendAmount = 0;
            let weekendCount = 0;

            activeBills.forEach(bill => {
                const date = new Date(bill.date);
                const dayOfWeek = date.getDay();
                if (dayOfWeek >= 1 && dayOfWeek <= 5) {
                    weekdayAmount += bill.amount;
                    weekdayCount++;
                } else {
                    weekendAmount += bill.amount;
                    weekendCount++;
                }
            });

            const totalAmount = weekdayAmount + weekendAmount;
            const weekdayPercent = totalAmount > 0 ? ((weekdayAmount / totalAmount) * 100).toFixed(1) : 0;
            const weekendPercent = totalAmount > 0 ? ((weekendAmount / totalAmount) * 100).toFixed(1) : 0;

            document.getElementById('weekdayAmount').textContent = `¥${weekdayAmount.toFixed(0)}`;
            document.getElementById('weekendAmount').textContent = `¥${weekendAmount.toFixed(0)}`;

            // 渲染工作日/周末对比图表
            renderChart("weekdayChart", {
                type: "bar",
                labels: ["工作日", "周末"],
                data: [weekdayAmount, weekendAmount],
                label: "消费金额",
                backgroundColor: ["rgba(102, 126, 234, 0.8)", "rgba(239, 68, 68, 0.8)"]
            });
        }

        function updateCalendarView(activeBills) {
            const year = calendarYear;
            const month = calendarMonth;
            const daysInMonth = [31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
            const monthNames = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
            
            const dailyData = {};
            let totalAmount = 0;
            let daysWithData = 0;

            activeBills.forEach(bill => {
                const date = new Date(bill.date);
                if (date.getFullYear() === year && date.getMonth() === month) {
                    const day = date.getDate();
                    const key = `${month}-${day}`;
                    if (!dailyData[key]) {
                        dailyData[key] = 0;
                    }
                    dailyData[key] += bill.amount;
                    totalAmount += bill.amount;
                    daysWithData++;
                }
            });

            const avgDaily = daysWithData > 0 ? (totalAmount / daysWithData).toFixed(0) : 0;
            document.getElementById('calendarAvg').textContent = `¥${avgDaily}`;

            const calendarGrid = document.getElementById('calendarGrid');
            calendarGrid.innerHTML = '';

            const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
            
            weekDays.forEach(day => {
                const dayHeader = document.createElement('div');
                dayHeader.style.padding = '8px';
                dayHeader.style.fontWeight = 'bold';
                dayHeader.style.color = '#a0aec0';
                dayHeader.style.fontSize = '12px';
                dayHeader.textContent = day;
                calendarGrid.appendChild(dayHeader);
            });

            const firstDay = new Date(year, month, 1).getDay();
            const days = daysInMonth[month];
            
            for (let i = 0; i < firstDay; i++) {
                const emptyDay = document.createElement('div');
                emptyDay.style.padding = '10px';
                emptyDay.style.background = 'rgba(255,255,255,0.02)';
                emptyDay.style.borderRadius = '5px';
                calendarGrid.appendChild(emptyDay);
            }
            
            for (let day = 1; day <= days; day++) {
                const dayCell = document.createElement('div');
                dayCell.style.padding = '10px';
                dayCell.style.borderRadius = '5px';
                dayCell.style.cursor = 'pointer';
                dayCell.style.transition = 'all 0.2s ease';
                
                const key = `${month}-${day}`;
                const amount = dailyData[key] || 0;
                
                if (amount > 0) {
                    const ratio = amount / avgDaily;
                    if (ratio > 1.2) {
                        dayCell.style.background = 'rgba(239, 68, 68, 0.8)';
                    } else if (ratio < 0.8) {
                        dayCell.style.background = 'rgba(34, 197, 94, 0.8)';
                    } else {
                        dayCell.style.background = 'rgba(245, 158, 11, 0.8)';
                    }
                    dayCell.style.color = 'white';
                    dayCell.innerHTML = `<div style="font-size: 14px; font-weight: bold;">${day}</div><div style="font-size: 10px;">¥${amount.toFixed(0)}</div>`;
                } else {
                    dayCell.style.background = 'rgba(255,255,255,0.02)';
                    dayCell.innerHTML = `<div style="font-size: 14px; color: #666;">${day}</div>`;
                }
                
                dayCell.onclick = () => {
                    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    
                    // 切换到账单明细Tab
                    switchTab('bills');
                    
                    // 筛选指定日期的账单
                    let filtered = billData.map((bill, index) => ({ ...bill, originalIndex: index }));
                    filtered = filtered.filter(b => b.date === dateStr);
                    
                    // 按日期降序排序
                    filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
                    
                    // 渲染账单列表
                    renderBillItems(filtered);
                    
                    setTimeout(() => {
                        const billList = document.getElementById('billList');
                        if (billList) {
                            billList.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        }
                    }, 100);
                };
                
                dayCell.onmouseover = () => {
                    if (amount > 0) {
                        dayCell.style.transform = 'scale(1.1)';
                        dayCell.style.boxShadow = '0 5px 15px rgba(0,0,0,0.3)';
                    }
                };
                
                dayCell.onmouseout = () => {
                    dayCell.style.transform = 'scale(1)';
                    dayCell.style.boxShadow = 'none';
                };
                
                calendarGrid.appendChild(dayCell);
            }

            document.getElementById('calendarMonthDisplay').textContent = `${year}年${monthNames[month]}`;
        }

        function changeCalendarMonth(delta) {
            calendarMonth += delta;
            if (calendarMonth > 11) {
                calendarMonth = 0;
                calendarYear++;
            } else if (calendarMonth < 0) {
                calendarMonth = 11;
                calendarYear--;
            }
            updateCalendarView(billData.filter((_, idx) => !refundedItems.has(idx)));
        }

        function showDailyBills(day) {
            // 构建日期字符串
            const dateStr = `${selectedYear}-${String(selectedMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            
            // 切换到账单明细Tab
            switchTab('bills');
            
            // 筛选指定日期的账单
            let filtered = billData.map((bill, index) => ({ ...bill, originalIndex: index }));
            filtered = filtered.filter(b => b.date === dateStr);
            
            // 按日期降序排序
            filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
            
            // 渲染账单列表
            renderBillItems(filtered);
            
            // 滚动到账单列表
            setTimeout(() => {
                const billList = document.getElementById('billList');
                if (billList) {
                    billList.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            }, 100);
        }

        function switchTab(tabName) {
            const tabs = ['overview', 'bills'];
            
            tabs.forEach(tab => {
                const tabBtn = document.querySelector(`.tab-btn[onclick="switchTab('${tab}')"]`);
                if (tabBtn) {
                    if (tab === tabName) {
                        tabBtn.style.background = 'rgba(102, 126, 234, 0.3)';
                        tabBtn.style.color = 'white';
                    } else {
                        tabBtn.style.background = 'rgba(255, 255, 255, 0.05)';
                        tabBtn.style.color = '#a0aec0';
                    }
                }
            });
            
            // 切换Tab内容
            tabs.forEach(tab => {
                const tabContent = document.getElementById(`${tab}Tab`);
                if (tabContent) {
                    if (tab === tabName) {
                        tabContent.style.display = 'block';
                    } else {
                        tabContent.style.display = 'none';
                    }
                }
            });
            
            localStorage.setItem('activeTab', tabName);
        }

        function toggleTheme() {
            const body = document.body;
            const btn = document.querySelector('.theme-toggle');
            
            if (body.classList.contains('light-mode')) {
                body.classList.remove('light-mode');
                btn.textContent = '🌙 深色模式';
                localStorage.setItem('theme', 'dark');
            } else {
                body.classList.add('light-mode');
                btn.textContent = '☀️ 浅色模式';
                localStorage.setItem('theme', 'light');
            }
        }

        async function fetchBills() {
            const email = document.getElementById("email").value;
            const emailType = document.getElementById("emailType").value;
            const authCode = document.getElementById("authCode").value;
            const statusEl = document.getElementById("status");
            const fetchBtn = document.getElementById("fetchBtn");

            if (!email || !authCode) {
                showStatus("请输入邮箱和密码/授权码", "error");
                return;
            }

            fetchBtn.disabled = true;
            showStatus(`<span class="spinner"></span>正在连接邮箱...`, "loading");

            try {
                // 使用相对路径，支持本地、Vercel和桌面应用
                const apiBaseUrl = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
                    ? `http://${window.location.hostname}:8080`
                    : '';
                
                // API路径
                const apiPath = '/api/fetch-bills';
                
                const response = await axios.post(`${apiBaseUrl}${apiPath}`, {
                    email: email,

        function renderChart(canvasId, config) {
            const canvas = document.getElementById(canvasId);

            }
            
            const ctx = canvas.getContext("2d");
            
            if (charts[canvasId]) {
                console.log('销毁旧图表:', canvasId);
                charts[canvasId].destroy();
            }

            console.log('创建新图表:', canvasId, '数据点数量:', config.data.length);
            
            const chartConfig = {
                type: config.type,
                data: {
                    labels: config.labels,
                    datasets: [{
                        label: config.label,
                        data: config.data,
                        borderColor: config.borderColor,
                        backgroundColor: config.backgroundColor,
                        borderWidth: 2,
                        tension: 0.4,
                        fill: config.type === "line"
                    }]
                },
                options: {
                    responsive: true,

                            display: config.type !== "line"
                        }
                    },
                    scales: config.type === "doughnut" ? {} : {

                            beginAtZero: true,

                            }
                        }
                    },
                    onClick: config.onClick ? (event, elements) => {

                    } : undefined
                }
            };
            
            charts[canvasId] = new Chart(ctx, chartConfig);

        function filterBills() {
            let filtered = billData.map((bill, index) => ({ ...bill, originalIndex: index }));
            
            // 搜索商家
            const searchMerchant = document.getElementById("searchMerchant");
            if (searchMerchant && searchMerchant.value) {
                filtered = filtered.filter(b => b.merchant.toLowerCase().includes(searchMerchant.value.toLowerCase()));
            }
            
            // 金额范围筛选
            const minAmountInput = document.getElementById("minAmount");
            const maxAmountInput = document.getElementById("maxAmount");
            const minAmount = minAmountInput ? parseFloat(minAmountInput.value) || 0 : 0;
            const maxAmount = maxAmountInput ? parseFloat(maxAmountInput.value) || Infinity : Infinity;
            filtered = filtered.filter(b => b.amount >= minAmount && b.amount <= maxAmount);
            
            // 日期筛选
            const dateFilter = document.getElementById("dateFilter");
            if (dateFilter && dateFilter.value !== "all") {
                const now = new Date();
                const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                
                if (dateFilter.value === "today") {
                    filtered = filtered.filter(b => new Date(b.date) >= today);
                } else if (dateFilter.value === "week") {
                    const weekAgo = new Date(today.getTime() - 7 * 24 * 60 * 60 * 1000);
                    filtered = filtered.filter(b => new Date(b.date) >= weekAgo);
                } else if (dateFilter.value === "month") {
                    const monthAgo = new Date(today.getTime() - 30 * 24 * 60 * 60 * 1000);
                    filtered = filtered.filter(b => new Date(b.date) >= monthAgo);
                } else if (dateFilter.value === "year") {
                    const yearAgo = new Date(today.getTime() - 365 * 24 * 60 * 60 * 1000);
                    filtered = filtered.filter(b => new Date(b.date) >= yearAgo);
                }
            }
            
            // 排序
            const sortOrder = document.getElementById("sortOrder");
            if (sortOrder) {
                if (sortOrder.value === "date-desc") {
                    filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
                } else if (sortOrder.value === "date-asc") {
                    filtered.sort((a, b) => new Date(a.date) - new Date(b.date));
                } else if (sortOrder.value === "amount-desc") {
                    filtered.sort((a, b) => b.amount - a.amount);
                } else if (sortOrder.value === "amount-asc") {
                    filtered.sort((a, b) => a.amount - b.amount);
                }
            } else {
                // 默认按日期降序排序
                filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
            }
            
            // 分组方式
            const groupBy = document.getElementById("groupBy");
            if (groupBy) {
                renderGroupedBills(filtered, groupBy.value);
            } else {
                renderBillItems(filtered);
            }
        }

        function renderGroupedBills(bills, groupBy) {
            const groups = {};
            
            bills.forEach(bill => {
                let key;
                const date = new Date(bill.date);
                
                if (groupBy === "date") {
                    key = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
                } else if (groupBy === "month") {
                    key = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
                } else if (groupBy === "year") {
                    key = `${date.getFullYear()}年`;
                } else if (groupBy === "category") {
                    key = bill.category;
                }
                
                if (!groups[key]) {
                    groups[key] = [];
                }
                groups[key].push(bill);
            });
            
            // 排序分组键
            const sortedKeys = Object.keys(groups).sort((a, b) => {
                if (groupBy === "category") {
                    return a.localeCompare(b, 'zh-CN');
                }
                return b.localeCompare(a); // 日期降序
            });
            
            let html = "";
            sortedKeys.forEach(key => {
                let groupBills = groups[key];
                // 在分组内按金额从大到小排序
                groupBills.sort((a, b) => b.amount - a.amount);
                
                // 计算分组总金额（排除已退款的项目）
                const groupTotal = groupBills
                    .filter(b => !refundedItems.has(b.originalIndex))
                    .reduce((sum, b) => sum + b.amount, 0);

                                            <h3>${bill.merchant}</h3>
                                            <p>${dateStr} · ${bill.category}</p>
                                        </div>
                                        <div style="display: flex; align-items: center;">
                                            <div class="bill-amount">¥${bill.amount.toFixed(2)}</div>

            doc.text(`总记录数: ${activeBills.length}`, 14, 40);
            doc.text(`总金额: ¥${activeBills.reduce((sum, b) => sum + b.amount, 0).toFixed(2)}`, 14, 48);
            
            const tableData = activeBills.slice(0, 100).map(b => [
                b.date,
                b.merchant.substring(0, 20),
                b.category,
                `¥${b.amount.toFixed(2)}`
            ]);
            
            doc.autoTable({
                head: [["日期", "商家", "分类", "金额"]],
                body: tableData,
                startY: 56,
                styles: { fontSize: 8, cellPadding: 2 },
                headStyles: { fillColor: [102, 126, 234] }
            });
            
            const fileName = `账单分析_${new Date().toISOString().split('T')[0]}.pdf`;
            doc.save(fileName);
        }

        function showStatus(message, type) {
            const statusEl = document.getElementById("status");
            statusEl.innerHTML = message;
            statusEl.className = `status ${type}`;
        }
    </script>
</body>
</html>
